spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/userservice
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      host: redis
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 3600000
